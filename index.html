<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL DE COMANDO PASTORAL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        .viewport { height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; }
        .section-base { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background-size: cover; background-position: center; scroll-snap-align: start; padding: 20px; text-align: center; }
        .extensor { height: 20vh; background: #111; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; font-style: italic; color: #aaa; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        
        .page1 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('foto2.jpg'); }
        .page2 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('foto3.jpg'); }
        .page3 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('foto4.jpg'); }
        .page4 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('foto5.jpg'); }

        .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; width: 95%; max-width: 500px; }
        #clock { font-size: 5rem; font-weight: 600; margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; margin-top: 20px; }
        .lever { background: #fff; color: #000; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input[type=range] { width: 40px; height: 100px; cursor: pointer; }

        .msg { background: #fff; color: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: 600; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; width: 100%; }
        .node { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .status-btn { border: none; padding: 5px 8px; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; }
        .switch { width: 200px; height: 60px; background: #b30000; border-radius: 30px; position: relative; cursor: pointer; border: 2px solid #fff; transition: 0.3s; }
        .slider { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 5px; transition: 0.3s; }
        .active { background: #22c55e; }
        .active .slider { left: 140px; }
    </style>
</head>
<body>

<div class="viewport">
    <section class="section-base page1">
        <div id="clock">00:00</div>
        <div class="controls">
            <div class="lever"><span>☀️</span><input type="range" min="0.3" max="1" step="0.1" value="1" oninput="document.body.style.filter='brightness('+this.value+')'"></div>
        </div>
    </section>

    <section class="extensor">"Lâmpada para os meus pés é tua palavra."</section>

    <section class="section-base page2">
        <h2 style="margin-bottom: 15px;">MENSAGENS</h2>
        <div class="glass" id="feed"></div>
    </section>

    <section class="extensor">"O Senhor é o meu pastor."</section>

    <section class="section-base page3">
        <h2 style="margin-bottom: 15px;">DISPOSITIVOS</h2>
        <div class="glass grid" id="list">Carregando instâncias...</div>
    </section>

    <section class="section-base page4">
        <div class="switch" onclick="this.classList.toggle('active')"><div class="slider"></div></div>
        <p style="margin-top:15px; font-size: 0.8rem; letter-spacing: 2px;">PROTOCOLO OPERACIONAL</p>
    </section>
</div>

<script>
    const API_URL = "http://187.127.31.203:8080";
    const API_KEY = "vml2026";
    const instancias = ["pastora_4557", "pastora_6621", "pastora_0806", "pastora_4079", "pastora_2545", "pastora_8933", "pastora_8180", "pastora_4854", "pastora_4726", "pastora_1184", "pastora_9760"];

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    async function atualizarStatus() {
        const list = document.getElementById('list');
        for (const inst of instancias) {
            try {
                const res = await fetch(`${API_URL}/instance/connectionState/${inst}`, { headers: { 'apikey': API_KEY } });
                const data = await res.json();
                const isOnline = data.instance?.state === 'open';
                
                let el = document.getElementById(inst);
                if (!el) {
                    el = document.createElement('div');
                    el.id = inst;
                    el.className = 'node';
                    list.appendChild(el);
                }
                el.innerHTML = `${inst.split('_')[1]} <button class="status-btn" style="background:${isOnline ? '#22c55e' : '#ef4444'}" onclick="iniciarConexao(this, '${inst}')">${isOnline ? 'ONLINE' : 'SCAN'}</button>`;
            } catch (e) { console.error(e); }
        }
    }

    async function iniciarConexao(btn, inst) {
        btn.innerText = "AGUARDE...";
        btn.style.background = "#f59e0b";
        
        try {
            const res = await fetch(`${API_URL}/instance/connect/${inst}`, { headers: { 'apikey': API_KEY } });
            const data = await res.json();
            
            if (data.base64) {
                const win = window.open("", "_blank", "width=400,height=400");
                win.document.write(`<img src="${data.base64}" style="width:100%"><p>Escaneie rápido!</p>`);
            } else {
                alert("Instância ocupada ou já conectada.");
            }
        } catch (e) {
            alert("Erro ao conectar.");
        }
        btn.innerText = "SCAN";
        btn.style.background = "#ef4444";
    }

    setInterval(atualizarStatus, 10000);
    atualizarStatus();
</script>
</body>
</html>
